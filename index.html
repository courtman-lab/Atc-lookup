<title>ATC Lookup</title>
<style>
:root{
  --radar:#00e5ff; --radar2:#00b4cc; --radar-dim:#004d5a;
  --bg:#0a0f1e; --surface:#111827; --surface2:#1a2236;
  --border:#1e3a5f; --text:#e8f4fd; --muted:#6b8aad;
  --warn:#ff6b35; --green:#22c55e; --amber:#f59e0b;
  --mil:#7c3aed; --mil2:#9f67ff; --mil-bg:#1a0d33;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;padding-top:var(--safe-top);padding-bottom:var(--safe-bot)}

/* Header */
header{padding:14px 16px 10px;background:linear-gradient(180deg,#060c1a 0%,transparent 100%);flex-shrink:0}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.radar-dot{width:9px;height:9px;border-radius:50%;background:var(--radar);box-shadow:0 0 8px var(--radar),0 0 20px var(--radar2);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
h1{font-size:16px;font-weight:800;letter-spacing:.08em;color:var(--radar);text-transform:uppercase}
.subtitle{font-size:10px;color:var(--muted);letter-spacing:.04em;margin-left:auto}

/* Search */
.search-wrap{position:relative;margin-bottom:10px}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;opacity:.45;pointer-events:none}
#search{width:100%;padding:12px 12px 12px 40px;background:var(--surface2);border:1.5px solid var(--border);border-radius:13px;color:var(--text);font-size:16px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;text-transform:uppercase;letter-spacing:.04em}
#search::placeholder{color:var(--muted);text-transform:none;letter-spacing:0}
#search:focus{border-color:var(--radar2);box-shadow:0 0 0 3px rgba(0,229,255,.12)}

/* Mode tabs */
.tabs{display:flex;gap:5px}
.tab{flex:1;padding:7px 3px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .18s}
.tab.active{background:var(--radar);color:#0a0f1e;border-color:var(--radar)}
.tab.mil-active{background:var(--mil2);color:#fff;border-color:var(--mil2)}

/* Counter */
#counter{font-size:10px;color:var(--muted);text-align:right;padding:6px 16px 3px;flex-shrink:0;letter-spacing:.04em}

/* List */
#results{flex:1;overflow-y:auto;padding:0 10px 10px;-webkit-overflow-scrolling:touch}
#results::-webkit-scrollbar{display:none}

/* Civil Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:15px;margin-bottom:9px;overflow:hidden;cursor:pointer;animation:sweepIn .16s ease both}
.card:active{transform:scale(.984)}
@keyframes sweepIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.card-head{display:flex;align-items:center;gap:11px;padding:13px 14px 9px}
.callsign-badge{background:linear-gradient(135deg,#0d2040 0%,#0a1a30 100%);border:1px solid var(--radar2);border-radius:9px;padding:6px 9px;min-width:88px;text-align:center;flex-shrink:0}
.cs-text{font-size:12px;font-weight:800;color:var(--radar);letter-spacing:.06em;line-height:1}
.cs-label{font-size:9px;color:var(--muted);letter-spacing:.08em;margin-top:2px;text-transform:uppercase}
.airline-info{flex:1;min-width:0}
.airline-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.airline-meta{display:flex;gap:6px;margin-top:3px;align-items:center;flex-wrap:wrap}
.badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;letter-spacing:.04em}
.badge-iata{background:rgba(0,229,255,.12);color:var(--radar)}
.badge-icao{background:rgba(0,180,204,.1);color:var(--radar2)}
.country-text{font-size:10px;color:var(--muted)}
.warn-badge{background:rgba(255,107,53,.15);color:var(--warn);border-radius:5px;font-size:9px;padding:2px 5px;font-weight:600}
.fleet-section{padding:0 14px 12px}
.fleet-label{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.fleet-chips{display:flex;flex-wrap:wrap;gap:4px}
.fleet-chip{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:3px 8px;font-size:10px;color:var(--text);display:flex;align-items:center;gap:3px}
.chip-count{color:var(--green);font-weight:700;font-size:11px}

/* Military Card */
.mil-card{background:var(--mil-bg);border:1px solid #3b1f6b;border-radius:15px;margin-bottom:9px;overflow:hidden;cursor:pointer;animation:sweepIn .16s ease both}
.mil-card:active{transform:scale(.984)}
.mil-head{display:flex;align-items:center;gap:11px;padding:13px 14px 9px}
.mil-badge{background:linear-gradient(135deg,#1a0d33 0%,#120826 100%);border:1px solid var(--mil2);border-radius:9px;padding:6px 9px;min-width:88px;text-align:center;flex-shrink:0}
.mil-cs{font-size:12px;font-weight:800;color:var(--mil2);letter-spacing:.06em;line-height:1}
.mil-info{flex:1;min-width:0}
.mil-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mil-meta{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;align-items:center}
.badge-nation{background:rgba(124,58,237,.2);color:var(--mil2);border-radius:5px;font-size:9px;padding:2px 6px;font-weight:700}
.badge-cat{border-radius:5px;font-size:9px;padding:2px 6px;font-weight:700}
.cat-TRANSPORT{background:rgba(34,197,94,.15);color:var(--green)}
.cat-FIGHTER{background:rgba(239,68,68,.15);color:#f87171}
.cat-TANKER{background:rgba(245,158,11,.15);color:var(--amber)}
.cat-ISR{background:rgba(59,130,246,.15);color:#60a5fa}
.cat-AWACS{background:rgba(236,72,153,.15);color:#f472b6}
.cat-VIP{background:rgba(168,85,247,.15);color:#c084fc}
.cat-SPECIAL{background:rgba(20,184,166,.15);color:#2dd4bf}
.cat-GENERIC{background:rgba(107,114,128,.15);color:#9ca3af}
.mil-aircraft{font-size:10px;color:var(--muted);padding:0 14px 4px}
.mil-notes{font-size:10px;color:#8ba3c0;padding:0 14px 12px;line-height:1.5}

/* Empty */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:42px;margin-bottom:10px;opacity:.4}
.empty-text{font-size:13px}

/* Radar bg */
.radar-bg{position:fixed;top:-100px;right:-100px;width:350px;height:350px;border-radius:50%;border:1px solid rgba(0,229,255,.04);pointer-events:none;z-index:0}
.radar-bg::before,.radar-bg::after{content:'';position:absolute;top:20px;left:20px;right:20px;bottom:20px;border-radius:50%;border:1px solid rgba(0,229,255,.06)}
.radar-bg::after{top:55px;left:55px;right:55px;bottom:55px;border-color:rgba(0,229,255,.08)}
mark{background:rgba(0,229,255,.22);color:var(--radar);border-radius:2px}
</style>
</head>

  {"cs":"BLAST","nation":"Niederlande / KLu","aircraft":"F-16AM Fighting Falcon","icao":"BLA","notes":"KLu F-16; Decimomannu & Nordeuropa-Übungen","cat":"FIGHTER","type":"military"},
  {"cs":"BULLDOG","nation":"Niederlande / KLu","aircraft":"F-16AM","icao":"BUL","notes":"Holländische F-16 Formationsflüge","cat":"FIGHTER","type":"military"},
  {"cs":"BAF","nation":"Belgien / Composante Air","aircraft":"F-16AM, A400M, C-130H","icao":"BAF","notes":"Belgian Air Force Standardprefix","cat":"GENERIC","type":"military"},
  {"cs":"BOBCAT","nation":"Belgien / Composante Air","aircraft":"F-16AM Fighting Falcon","icao":"BBC","notes":"Belgische F-16 Araxos (Griechenland) & Belgien","cat":"FIGHTER","type":"military"},
  {"cs":"AME","nation":"Spanien / Ejército del Aire","aircraft":"EF-18A/B, C/KC-130H, A400M, CN-235","icao":"AME","notes":"Ejército del Aire – Standardprefix","cat":"GENERIC","type":"military"},
  {"cs":"DAF","nation":"Dänemark / Flyvevåbnet","aircraft":"F-16AM, C-130J, CL-604, Gulfstream","icao":"DAF","notes":"Danish Air Force – Prefix; DAF + 4-stellig","cat":"GENERIC","type":"military"},
  {"cs":"NAF","nation":"Norwegen / Luftforsvaret","aircraft":"F-35A, C-130J, P-8A Poseidon","icao":"NAF","notes":"Norwegian Air Force – NAF + 4-stellig","cat":"GENERIC","type":"military"},
  {"cs":"TUAF","nation":"Türkei / THK","aircraft":"F-16C/D, A400M, KC-135R","icao":"TUF","notes":"Turkish Air Force; A400M aktiv in Europa","cat":"GENERIC","type":"military"},
  {"cs":"CANFORCE","nation":"Kanada / RCAF","aircraft":"CF-18, CC-150T Polaris, CC-177","icao":"CAF","notes":"Canadian Armed Forces Lufttransport; CC-150T Tanker","cat":"TRANSPORT","type":"military"},
  {"cs":"HUSKY","nation":"Kanada / RCAF","aircraft":"CC-150T Polaris (A310 MRTT)","icao":"HUS","notes":"Kanadischer Tanker; gelegentlich in Europa (NATO-Übungen)","cat":"TANKER","type":"military"},
  {"cs":"AWACS","nation":"NATO","aircraft":"E-3A Sentry","icao":"AWC","notes":"NATO Airborne Early Warning Force; E-3A mit NATO-Kennung, Geilenkirchen","cat":"AWACS","type":"military"},
  {"cs":"BROADSWORD","nation":"NATO","aircraft":"E-3 Sentry","icao":"BDS","notes":"NATO E-3 Trapani (Sizilien) TDY-Missionen","cat":"AWACS","type":"military"},
];


const DB=[...CIVIL,...MILITARY];

function parseFleet(s){
  return s.split(',').map(p=>{
    const m=p.trim().match(/^(.+?)×(\d+)(.*)$/);
    return m?{type:m[1].trim(),count:parseInt(m[2])}:{type:p.trim(),count:null};
  });
}

function hl(text,q){
  if(!q) return text;
  const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re,'<mark>$1</mark>');
}

function civilCard(a,q){
  const fleet=parseFleet(a.fleet);
  const isWarn=a.country.includes('⚠');
  const chips=fleet.map(c=>`<span class="fleet-chip"><span class="chip-count">${c.count!==null?c.count+' ×':''}</span>${c.type}</span>`).join('');
  return `<div class="card">
    <div class="card-head">
      <div class="callsign-badge"><div class="cs-text">${hl(a.cs,q)}</div><div class="cs-label">Callsign</div></div>
      <div class="airline-info">
        <div class="airline-name">${hl(a.n,q)}</div>
        <div class="airline-meta">
          <span class="badge badge-iata">${hl(a.iata,q)}</span>
          <span class="badge badge-icao">${hl(a.icao,q)}</span>
          <span class="country-text">${a.country.replace(' ⚠','')}</span>
          ${isWarn?'<span class="warn-badge">⚠ EU-Sperre</span>':''}
        </div>
      </div>
    </div>
    <div class="fleet-section"><div class="fleet-label">Flotte</div><div class="fleet-chips">${chips}</div></div>
  </div>`;
}

const CAT_LABELS={'TRANSPORT':'Transport','FIGHTER':'Kampfjet','TANKER':'Tanker','ISR':'Aufklärung','AWACS':'AWACS','VIP':'VIP/Regierung','SPECIAL':'Spezialmission','GENERIC':'Diverse'};

function milCard(m,q){
  const cat=CAT_LABELS[m.cat]||m.cat;
  return `<div class="mil-card">
    <div class="mil-head">
      <div class="mil-badge"><div class="mil-cs">${hl(m.cs,q)}</div><div class="cs-label">Callsign</div></div>
      <div class="mil-info">
        <div class="mil-name">${hl(m.nation,q)}</div>
        <div class="mil-meta">
          <span class="badge badge-nation">ICAO: ${hl(m.icao,q)}</span>
          <span class="badge badge-cat cat-${m.cat}">${cat}</span>
        </div>
      </div>
    </div>
    <div class="mil-aircraft">✈ ${hl(m.aircraft,q)}</div>
    <div class="mil-notes">${hl(m.notes,q)}</div>
  </div>`;
}

let mode='all';
const searchEl=document.getElementById('search');
const resultsEl=document.getElementById('results');
const counterEl=document.getElementById('counter');

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active','mil-active'));
    mode=t.dataset.mode;
    t.classList.add(mode==='military'?'mil-active':'active');
    render();
  });
});

function matches(item,q){
  const s=q.toUpperCase();
  if(item.type==='civil'){
    return item.cs.toUpperCase().includes(s)||item.iata.toUpperCase().includes(s)||
           item.icao.toUpperCase().includes(s)||item.n.toUpperCase().includes(s)||
           item.country.toUpperCase().includes(s)||item.fleet.toUpperCase().includes(s);
  } else {
    return item.cs.toUpperCase().includes(s)||item.nation.toUpperCase().includes(s)||
           item.aircraft.toUpperCase().includes(s)||item.icao.toUpperCase().includes(s)||
           item.notes.toUpperCase().includes(s)||item.cat.toUpperCase().includes(s);
  }
}

function render(){
  const raw=searchEl.value.trim();
  const q=raw.toUpperCase();
  let pool=DB;
  if(mode==='civil') pool=CIVIL;
  else if(mode==='military') pool=MILITARY;
  else if(mode==='cs') pool=DB;
  const res=q?pool.filter(item=>mode==='cs'?(item.cs||'').toUpperCase().includes(q):matches(item,q)):pool;
  const civCount=res.filter(x=>x.type==='civil').length;
  const milCount=res.filter(x=>x.type==='military').length;
  counterEl.textContent=mode==='all'?`${civCount} Zivil · ${milCount} Militär`:`${res.length} Treffer`;
  if(!res.length){
    resultsEl.innerHTML=`<div class="empty"><div class="empty-icon">📡</div><div class="empty-text">Kein Treffer für "${raw}"</div></div>`;
    return;
  }
  resultsEl.innerHTML=res.map(item=>item.type==='military'?milCard(item,raw):civilCard(item,raw)).join('');
}

searchEl.addEventListener('input',render);
render();
</script>
</body>
</html>
